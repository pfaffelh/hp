name: Build and deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install staticjinja pybtex jinja2 latexcodec

      - name: Regenerate publications HTML from BibTeX
        working-directory: bibliography
        run: python make_bibhtml.py

      - name: Render site
        run: python build.py

      - name: Copy static assets
        run: cp -r static _site/static

      - name: Compile thesis topic PDFs
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: templates/theses/_latex
          root_file: "*.tex"
          latexmk_use_xelatex: true

      - name: Move thesis PDFs into _site
        run: |
          mkdir -p _site/static/theses
          if compgen -G "templates/theses/_latex/*.pdf" > /dev/null; then
            mv templates/theses/_latex/*.pdf _site/static/theses/
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
