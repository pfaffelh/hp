name: Build and deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install staticjinja pybtex jinja2 latexcodec

      - name: Regenerate publications HTML from BibTeX
        working-directory: bibliography
        run: python make_bibhtml.py

      - name: Render site
        run: python build.py

      - name: Copy static assets
        run: cp -r static _site/static

      - name: Generate thesis LaTeX sources from HTML partials
        run: python scripts/make_theses.py

      - name: Compile thesis topic PDFs
        uses: xu-cheng/latex-action@v3
        continue-on-error: true
        with:
          working_directory: templates/theses/_latex
          # Each .tex emits non-fatal KOMA warnings, so we run our own
          # loop here (PDFs ARE produced) instead of letting the action
          # stop on the first non-zero latexmk exit.
          root_file: __noop__
          latexmk_use_xelatex: true
          pre_compile: |
            for f in *.tex; do
              echo "===== Compiling $f ====="
              latexmk -xelatex -f -interaction=nonstopmode -file-line-error "$f" || true
            done
            # Second pass to resolve \pageref{LastPage} (1 / ?? -> 1 / 1)
            for f in *.tex; do
              latexmk -xelatex -f -interaction=nonstopmode -file-line-error "$f" || true
            done
            ls -la *.pdf
            # Drop the dummy root_file so the action's own compile finds nothing to do.
            : > __noop__.tex

      - name: Move thesis PDFs into _site
        run: |
          mkdir -p _site/static/theses
          pdfs=$(ls templates/theses/_latex/*.pdf 2>/dev/null || true)
          if [ -z "$pdfs" ]; then
            echo "::error::No thesis PDFs produced"
            exit 1
          fi
          mv $pdfs _site/static/theses/
          echo "Moved $(echo "$pdfs" | wc -w) PDFs into _site/static/theses/"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
